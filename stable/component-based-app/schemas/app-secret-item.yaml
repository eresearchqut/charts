$schema: "https://json-schema.org/draft/2020-12/schema"
type: object
required: [envName, secretKey]
description: Maps a Kubernetes Secret key to an environment variable name.
properties:
  envName:
    type: string
    description: Name of the environment variable exposed to the container.
  secretKey:
    type: string
    description: Key within the referenced Kubernetes Secret.
