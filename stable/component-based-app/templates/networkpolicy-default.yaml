{{- if .Values.networkPolicy.enabled }}
---
# Baseline: deny all ingress and egress for every pod belonging to this release,
# then restore DNS so pods can resolve cluster-internal names.
# Per-component and database policies layer additional allows on top of this.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "component-based-app.fullname" . }}-default-deny
  labels:
    {{- include "component-based-app.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
