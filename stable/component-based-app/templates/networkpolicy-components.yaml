{{- if .Values.networkPolicy.enabled }}
{{- range $name, $spec := .Values.components }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "component-based-app.fullname" $ }}-{{ $name }}
  labels:
    app.kubernetes.io/component: {{ $name }}
    {{- include "component-based-app.labels" $ | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: {{ $name }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
  policyTypes:
    - Ingress
    - Egress
  egress:
    {{- if $spec.allowDatabaseAccess }}
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: {{ include "component-based-app.fullname" $ }}-db
      ports:
        - port: 5432
          protocol: TCP
    {{- end }}
    {{- range $spec.serviceLinks }}
    {{- $targetSpec := index $.Values.components .targetName }}
    {{- if empty $targetSpec }}
      {{- fail (printf "serviceLinks: component '%s' not found" .targetName) }}
    {{- end }}
    {{- if not $targetSpec }}
      {{- fail (printf "serviceLinks: component '%s' is disabled" .targetName) }}
    {{- end }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: {{ .targetName }}
              app.kubernetes.io/instance: {{ $.Release.Name }}
      ports:
        - port: {{ $targetSpec.port }}
          protocol: TCP
    {{- end }}
    # Allow pods of this component (including Helm test hooks) to reach their own service.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: {{ $name }}
              app.kubernetes.io/instance: {{ $.Release.Name }}
      ports:
        - port: {{ $spec.port }}
          protocol: TCP
    {{- with $spec.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  ingress:
    {{- if $.Values.ingress.host }}
    {{- if eq $name $.Values.ingress.targetComponent }}
    {{- include "component-based-app.ingressPublicRule" $spec.port | nindent 4 }}
    {{- else }}
    {{- range $.Values.ingress.paths }}
    {{- if eq $name .targetComponent }}
    {{- include "component-based-app.ingressPublicRule" $spec.port | nindent 4 }}
    {{- end }}
    {{- end }}
    {{- end }}
    {{- end }}
    {{- range $siblingName, $siblingSpec := $.Values.components }}
    {{- range $siblingSpec.serviceLinks }}
    {{- if eq .targetName $name }}
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: {{ $siblingName }}
              app.kubernetes.io/instance: {{ $.Release.Name }}
      ports:
        - port: {{ $spec.port }}
          protocol: TCP
    {{- end }}
    # Allow pods of this component (including Helm test hooks) to reach their own service.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: {{ $name }}
              app.kubernetes.io/instance: {{ $.Release.Name }}
      ports:
        - port: {{ $spec.port }}
          protocol: TCP
    {{- end }}
    {{- end }}
    {{- with $spec.extraIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
{{- end }}
