{{- if .Values.database }}
{{- $_ := required "database.image.tag is required" .Values.database.image.tag }}
---
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "component-based-app.fullname" . }}-db-test-connection"
  labels:
    app.kubernetes.io/component: database
    {{- include "component-based-app.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  containers:
    - name: pg-isready
      image: {{ printf "%s:%s" .Values.database.image.repository .Values.database.image.tag }}
      command: ['pg_isready']
      args:
        - '-h'
        - '{{ include "component-based-app.fullname" . }}-db-rw'
        - '-U'
        - '{{ include "component-based-app.name" . }}'
        - '-d'
        - '{{ include "component-based-app.name" . }}'
      env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.database.secretName | default (printf "%s-database" (include "component-based-app.fullname" .)) }}
              key: password
  restartPolicy: Never
{{- end }}
