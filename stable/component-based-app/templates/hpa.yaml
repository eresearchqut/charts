{{- range $name, $spec := .Values.components }}
{{- $autoscaling := include "component-based-app.autoscaling" (dict "spec" $spec) | fromYaml }}
{{- if $spec.autoscaling }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "component-based-app.fullname" $ }}-{{ $name }}
  labels:
    app.kubernetes.io/component: {{ $name }}
    {{- include "component-based-app.labels" $ | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "component-based-app.fullname" $ }}-{{ $name }}
  minReplicas: {{ $autoscaling.minReplicas }}
  maxReplicas: {{ $autoscaling.maxReplicas }}
  metrics:
    {{- if hasKey $autoscaling "targetCPUUtilizationPercentage" }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if hasKey $autoscaling "targetMemoryUtilizationPercentage" }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ $autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
  {{- $behavior := $autoscaling.behavior | default dict }}
  {{- if or $behavior.scaleDown $behavior.scaleUp }}
  behavior:
    {{- with $behavior.scaleDown }}
    scaleDown:
      {{- if .stabilizationWindowSeconds }}
      stabilizationWindowSeconds: {{ .stabilizationWindowSeconds }}
      {{- end }}
      {{- with .policies }}
      policies:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .selectPolicy }}
      selectPolicy: {{ .selectPolicy }}
      {{- end }}
    {{- end }}
    {{- with $behavior.scaleUp }}
    scaleUp:
      {{- if .stabilizationWindowSeconds }}
      stabilizationWindowSeconds: {{ .stabilizationWindowSeconds }}
      {{- end }}
      {{- with .policies }}
      policies:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .selectPolicy }}
      selectPolicy: {{ .selectPolicy }}
      {{- end }}
    {{- end }}
  {{- else }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
  {{- end }}
{{- end }}
{{- end }}
