{{- if and .Values.networkPolicy.enabled .Values.database.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "component-based-app.fullname" . }}-database
  labels:
    app.kubernetes.io/component: database
    {{- include "component-based-app.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: {{ include "component-based-app.fullname" . }}-db
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- range $name, $spec := .Values.components }}
    {{- if $spec.allowDatabaseAccess }}
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: {{ $name }}
              app.kubernetes.io/instance: {{ $.Release.Name }}
      ports:
        - port: 5432
          protocol: TCP
        - port: 8000
          protocol: TCP
    {{- end }}
    {{- end }}
    # Allow the database component's own pods (e.g. Helm test hooks) to connect.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: database
              app.kubernetes.io/instance: {{ $.Release.Name }}
      ports:
        - port: 5432
          protocol: TCP
        - port: 8000
          protocol: TCP
    {{- if .Values.networkPolicy.monitoringSelector }}
    - from:
{{- toYaml (list .Values.networkPolicy.monitoringSelector) | nindent 8 }}
      ports:
        - port: 9187
          protocol: TCP
    {{- end }}
    {{- if .Values.networkPolicy.cnpgOperatorSelector }}
    - from:
{{- toYaml (list .Values.networkPolicy.cnpgOperatorSelector) | nindent 8 }}
    {{- end }}
    - from:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: {{ include "component-based-app.fullname" . }}-db
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: {{ include "component-based-app.fullname" . }}-db
    {{- /* Kubernetes API server: required by CNPG for leader election and cluster management.
         Restrict further via database.extraEgress if the API server CIDR is known. */}}
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    {{- with .Values.database.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}

---
# Allow database-component pods (e.g. Helm test hooks) to connect to the database cluster.
# The database netpol above governs the CNPG pods; this one governs auxiliary pods
# that carry the database component label but are NOT the CNPG instances themselves.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "component-based-app.fullname" . }}-database-client
  labels:
    app.kubernetes.io/component: database
    {{- include "component-based-app.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: database
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: {{ include "component-based-app.fullname" . }}-db
      ports:
        - port: 5432
          protocol: TCP
{{- end }}
