{{- if .Values.database.enabled }}
{{- $clusterName := printf "%s-db" (include "component-based-app.fullname" .) }}
{{- $backupInstanceName := .Values.database.backup.instanceName | default (include "component-based-app.fullname" .) }}
{{- $backupName := printf "%s-%s-backup" $backupInstanceName .Values.database.backup.envName }}
{{- $backupResourceName := $backupName | trunc 63 | trimSuffix "-" }}
{{- $_ := required "database.image.tag is required" .Values.database.image.tag }}
{{- if .Values.database.backup.enabled }}
{{- $_ := required "database.backup.secretName is required when database.backup.enabled is true" .Values.database.backup.secretName }}
{{- $_ := required "database.backup.schedule is required when database.backup.enabled is true" .Values.database.backup.schedule }}
{{- $_ := required "database.backup.envName is required when database.backup.enabled is true" .Values.database.backup.envName }}
{{- end }}
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ $clusterName }}
  labels:
    {{- include "component-based-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  imageName: {{ printf "%s:%s" .Values.database.image.repository .Values.database.image.tag }}
{{ if .Values.database.backup.enabled }}
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: {{ $backupResourceName }}
{{ end }}
  instances: {{ .Values.database.instances | default 1 }}
  affinity:
    enablePodAntiAffinity: true
  storage:
    storageClass: {{ .Values.database.storageClass | default "vsan-file" }}
    size: {{ .Values.database.storageSize }}
  walStorage:
    storageClass: {{ .Values.database.walStorageClass | default "vsan-file" }}
    size: {{ .Values.database.walStorageSize }}
  resources:
    requests:
      memory: {{ .Values.database.resources.requests.memory }}
      cpu: {{ .Values.database.resources.requests.cpu | quote }}
    limits:
      memory: {{ .Values.database.resources.limits.memory }}
      cpu: {{ .Values.database.resources.limits.cpu | quote }}
  monitoring:
    enablePodMonitor: false
  bootstrap:
    initdb:
      dataChecksums: true
      walSegmentSize: 32
      database: {{ include "component-based-app.name" . }}
      owner: {{ include "component-based-app.name" . }}
      secret:
        name: {{ .Values.database.secretName | default (printf "%s-database" (include "component-based-app.fullname" .)) }}
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ $clusterName }}
  labels:
    {{- include "component-based-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
    cnpg.io/cluster: {{ $clusterName }}
spec:
  podMetricsEndpoints:
    - port: metrics
  selector:
    matchLabels:
      cnpg.io/cluster: {{ $clusterName }}
      cnpg.io/podRole: instance
{{ if .Values.database.backup.enabled }}
---
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: {{ $backupResourceName }}
  labels:
    {{- include "component-based-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  configuration:
    data:
      compression: gzip
      immediateCheckpoint: true
      jobs: 2
    destinationPath: {{ printf "s3://eresearch-k8s-postgres-backup/%s" $backupName | quote }}
    endpointURL: https://s3.ap-southeast-2.amazonaws.com/
    s3Credentials:
      accessKeyId:
        key: ACCESS_KEY_ID
        name: {{ .Values.database.backup.secretName }}
      secretAccessKey:
        key: ACCESS_SECRET_KEY
        name: {{ .Values.database.backup.secretName }}
    wal:
      compression: gzip
      maxParallel: 32
  retentionPolicy: 14d
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: {{ $backupResourceName }}
  labels:
    {{- include "component-based-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  backupOwnerReference: self
  cluster:
    name: {{ $clusterName }}
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
  schedule: {{ .Values.database.backup.schedule | quote }}
  target: prefer-standby
{{ end }}
{{- end }}
