suite: Autoscaling (HPA) Behavior
templates:
  - deployment.yaml
  - hpa.yaml

release:
  name: scalable
  namespace: prod

set:

tests:
  # --- HPA enabled ---
  - it: creates HPA when autoscaling is enabled
    set:
      components:
        api:
          image:
            repository: "example.com/app"
            tag: "latest"
          port: 8000
          command: ["python", "run.py"]
          livenessProbe:
            path: /health
          autoscaling:
            minReplicas: 2
            maxReplicas: 10
            targetCPUUtilizationPercentage: 70
    asserts:
      - hasDocuments:
          count: 1
        template: hpa.yaml

  - it: HPA points to the correct Deployment
    set:
      components:
        api:
          image:
            repository: "example.com/app"
            tag: "latest"
          port: 8000
          command: ["python", "run.py"]
          livenessProbe:
            path: /health
          autoscaling:
            minReplicas: 1
            maxReplicas: 10
    template: hpa.yaml
    documentIndex: 0
    asserts:
      - equal:
          path: spec.scaleTargetRef.kind
          value: Deployment
      - equal:
          path: spec.scaleTargetRef.name
          value: scalable-component-based-app-api

  - it: HPA has configured min/max replicas
    set:
      components:
        api:
          image:
            repository: "example.com/app"
            tag: "latest"
          port: 8000
          command: ["python", "run.py"]
          livenessProbe:
            path: /health
          autoscaling:
            minReplicas: 3
            maxReplicas: 25
    template: hpa.yaml
    documentIndex: 0
    asserts:
      - equal:
          path: spec.minReplicas
          value: 3
      - equal:
          path: spec.maxReplicas
          value: 25

  - it: Deployment does NOT have replicas field when HPA is enabled
    set:
      components:
        api:
          image:
            repository: "example.com/app"
            tag: "latest"
          port: 8000
          command: ["python", "run.py"]
          livenessProbe:
            path: /health
          autoscaling:
            minReplicas: 1
            maxReplicas: 10
    documentIndex: 0
    asserts:
      - notExists:
          path: spec.replicas

  # --- HPA disabled ---
  - it: no HPA created when autoscaling is disabled
    set:
      components:
        api:
          image:
            repository: "example.com/app"
            tag: "latest"
          port: 8000
          command: ["python", "run.py"]
          livenessProbe:
            path: /health
    asserts:
      - hasDocuments:
          count: 0
        template: hpa.yaml

  - it: Deployment has replicas when autoscaling is disabled (or omitted)
    set:
      components:
        api:
          image:
            repository: "example.com/app"
            tag: "latest"
          port: 8000
          command: ["python", "run.py"]
          livenessProbe:
            path: /health
    template: deployment.yaml
    documentIndex: 0
    asserts:
      - equal:
          path: spec.replicas
          value: 1

  # --- Memory metric (conditional) ---
  - it: HPA includes CPU metric when targetCPUUtilizationPercentage is set
    set:
      components:
        api:
          image:
            repository: "example.com/app"
            tag: "latest"
          port: 8000
          command: ["python", "run.py"]
          livenessProbe:
            path: /health
          autoscaling:
            minReplicas: 1
            maxReplicas: 10
            targetCPUUtilizationPercentage: 80
    template: hpa.yaml
    documentIndex: 0
    asserts:
      - contains:
          path: spec.metrics
          content:
            type: Resource
            resource:
              name: cpu
              target:
                type: Utilization
                averageUtilization: 80

  - it: HPA includes memory metric when targetMemoryUtilizationPercentage is set
    set:
      components:
        api:
          image:
            repository: "example.com/app"
            tag: "latest"
          port: 8000
          command: ["python", "run.py"]
          livenessProbe:
            path: /health
          autoscaling:
            minReplicas: 1
            maxReplicas: 10
            targetMemoryUtilizationPercentage: 80
    template: hpa.yaml
    documentIndex: 0
    asserts:
      - contains:
          path: spec.metrics
          content:
            type: Resource
            resource:
              name: memory
              target:
                type: Utilization
                averageUtilization: 80

  # --- Multiple components with mixed autoscaling ---
  - it: only the autoscaled component gets HPA, not others
    set:
      components:
        api:
          image:
            repository: "example.com/app"
            tag: "latest"
          port: 8000
          command: ["python", "run.py"]
          livenessProbe:
            path: /health
          autoscaling:
            minReplicas: 1
            maxReplicas: 100
        worker:
          port: 8080
          image:
            repository: "example.com/app"
            tag: "latest"
          command: ["node", "worker.js"]
          livenessProbe:
            path: /health
    template: hpa.yaml
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.scaleTargetRef.name
          value: scalable-component-based-app-api
        documentIndex: 0

  # --- HPA with targetCPUUtilizationPercentage: 0 (regression) ---
  - it: HPA renders CPU metric even when targetCPUUtilizationPercentage is 0
    set:
      components:
        app:
          image:
            repository: "example.com/app"
            tag: "latest"
          port: 3000
          command: ["node", "server.js"]
          livenessProbe:
            path: /health
          autoscaling:
            minReplicas: 1
            maxReplicas: 10
            targetCPUUtilizationPercentage: 0
    template: hpa.yaml
    documentIndex: 0
    asserts:
      - contains:
          path: spec.metrics
          content:
            type: Resource
            resource:
              name: cpu
              target:
                type: Utilization
                averageUtilization: 0
